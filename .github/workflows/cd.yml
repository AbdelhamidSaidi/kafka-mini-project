name: CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    environment: .env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from GitHub secrets
        shell: bash
        run: |
            cat > .env << 'ENVEOF'
            MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
            OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}
            OCI_CONFIG_PROFILE=${{ secrets.OCI_CONFIG_PROFILE }}
            OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
            OCI_HOST=${{ secrets.OCI_HOST }}
            OCI_REGION=${{ secrets.OCI_REGION }}
            OCI_TENANCY=${{ secrets.OCI_TENANCY }}
            OCI_USER=${{ secrets.OCI_USER }}
            OCI_CONFIG_FILE=${{ secrets.OCI_CONFIG_FILE }}
            OCI_KEY_FILE=${{ secrets.OCI_KEY_FILE }}
            OCI_SSH_PRIVATE_KEY=${{ secrets.OCI_SSH_PRIVATE_KEY }}
            ENVEOF

      - name: Validate required variables
        shell: bash
        run: |
          test -n "${{ secrets.OCI_HOST }}" || (echo "Missing secret: OCI_HOST" && exit 1)
          test -n "${{ secrets.OCI_USER }}" || (echo "Missing secret: OCI_USER" && exit 1)
          test -n "${{ secrets.OCI_SSH_PRIVATE_KEY }}" || (echo "Missing secret: OCI_SSH_PRIVATE_KEY " && exit 1)
          test -n "${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}" || (echo "Missing secret: OCI_VM_SSH_PRIVATE_KEY (for Oracle VM connection)" && exit 1)
          echo "All required secrets are present"

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          # Write SSH key directly from secret (preserves line breaks)
          printf "%s\n" "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          
          # Display key fingerprint for debugging (without revealing key)
          ssh-keygen -l -f ~/.ssh/oci_key || echo "Warning: Could not generate fingerprint"
          
          # Add host to known_hosts
          OCI_PORT="${{ secrets.OCI_PORT }}"
          ssh-keyscan -p "${OCI_PORT:-22}" "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts 2>&1 || echo "Warning: ssh-keyscan failed, proceeding anyway"

      - name: Sync repository to Oracle VM
        shell: bash
        run: |
          OCI_PORT="${{ secrets.OCI_PORT }}"
          OCI_APP_PATH="${{ secrets.OCI_APP_PATH }}"
          OCI_USER="${{ secrets.OCI_USER }}"
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/oci_vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${OCI_PORT:-22}" \
            --exclude ".git" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "$OCI_USER@${{ secrets.OCI_HOST }}:${OCI_APP_PATH:-/home/$OCI_USER/IoT-sensors-streaming-pipeline}/"

      - name: Deploy with docker compose
        shell: bash
        run: |
          OCI_PORT="${{ secrets.OCI_PORT }}"
          OCI_APP_PATH="${{ secrets.OCI_APP_PATH }}"
          OCI_USER="${{ secrets.OCI_USER }}"
          
          ssh -i ~/.ssh/oci_vm_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${OCI_PORT:-22}" \
            "$OCI_USER@${{ secrets.OCI_HOST }}" \
            "cd ${OCI_APP_PATH:-/home/$OCI_USER/IoT-sensors-streaming-pipeline} && docker compose down && docker compose up -d --build"