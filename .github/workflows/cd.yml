name: CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    environment: .env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from GitHub secrets
        shell: bash
        run: |
            cat > .env << 'ENVEOF'
            MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
            OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}
            OCI_CONFIG_PROFILE=${{ secrets.OCI_CONFIG_PROFILE }}
            OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
            OCI_HOST=${{ secrets.OCI_HOST }}
            OCI_REGION=${{ secrets.OCI_REGION }}
            OCI_TENANCY=${{ secrets.OCI_TENANCY }}
            OCI_USER=${{ secrets.OCI_USER }}
            OCI_CONFIG_FILE=${{ secrets.OCI_CONFIG_FILE }}
            OCI_KEY_FILE=${{ secrets.OCI_KEY_FILE }}
            OCI_SSH_PRIVATE_KEY=${{ secrets.OCI_SSH_PRIVATE_KEY }}
            ENVEOF

      - name: Validate required variables
        shell: bash
        run: |
          grep -q "OCI_HOST=" .env || (echo "Missing in .env: OCI_HOST" && exit 1)
          grep -q "OCI_USER=" .env || (echo "Missing in .env: OCI_USER" && exit 1)
          grep -q "OCI_SSH_PRIVATE_KEY=" .env || (echo "Missing in .env: OCI_SSH_PRIVATE_KEY" && exit 1)
          echo "All required variables found in .env"

      - name: Setup SSH key
        shell: bash
        run: |
          OCI_SSH_PRIVATE_KEY=$(grep "^OCI_SSH_PRIVATE_KEY=" .env | cut -d= -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          OCI_HOST=$(grep "^OCI_HOST=" .env | cut -d= -f2 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          OCI_PORT=$(grep "^OCI_PORT=" .env | cut -d= -f2 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' || echo "22")
          
          if [ -z "$OCI_SSH_PRIVATE_KEY" ]; then
            echo "Error: OCI_SSH_PRIVATE_KEY not found in .env"
            exit 1
          fi
          
          mkdir -p ~/.ssh
          printf "%s" "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          
          if [ -z "$OCI_HOST" ]; then
            echo "Error: OCI_HOST not found in .env"
            exit 1
          fi
          
          ssh-keyscan -p "${OCI_PORT:-22}" "$OCI_HOST" >> ~/.ssh/known_hosts 2>&1 || true

      - name: Sync repository to Oracle VM
        shell: bash
        run: |
          OCI_PORT="${{ secrets.OCI_PORT }}"
          OCI_APP_PATH="${{ secrets.OCI_APP_PATH }}"
          OCI_USER="${{ secrets.OCI_USER }}"
          
          rsync -az --delete \
            -e "ssh -i ~/.ssh/oci_key -p ${OCI_PORT:-22}" \
            --exclude ".git" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "$OCI_USER@${{ secrets.OCI_HOST }}:${OCI_APP_PATH:-/home/$OCI_USER/IoT-sensors-streaming-pipeline}/"

      - name: Deploy with docker compose
        shell: bash
        run: |
          OCI_PORT="${{ secrets.OCI_PORT }}"
          OCI_APP_PATH="${{ secrets.OCI_APP_PATH }}"
          OCI_USER="${{ secrets.OCI_USER }}"
          
          ssh -i ~/.ssh/oci_key -p "${OCI_PORT:-22}" "$OCI_USER@${{ secrets.OCI_HOST }}" << EOF
            set -e
            cd "${OCI_APP_PATH:-/home/$OCI_USER/IoT-sensors-streaming-pipeline}"
            docker compose down
            docker compose up -d --build
          EOF