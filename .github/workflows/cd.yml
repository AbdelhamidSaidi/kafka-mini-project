name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    environment: .env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.OCI_HOST }}"            ]] && missing+=("OCI_HOST")
          [[ -z "${{ secrets.OCI_USER }}"            ]] && missing+=("OCI_USER")
          [[ -z "${{ secrets.OCI_PORT }}"            ]] && missing+=("OCI_PORT")
          [[ -z "${{ secrets.OCI_APP_PATH }}"        ]] && missing+=("OCI_APP_PATH")
          [[ -z "${{ secrets.OCI_VM_KEY }}"          ]] && missing+=("OCI_VM_KEY")
          [[ -z "${{ secrets.MSSQL_SA_PASSWORD }}"   ]] && missing+=("MSSQL_SA_PASSWORD")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"


      - name: Create .env file
        run: |
          cat > .env <<EOF
          MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
          OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_CONFIG_PROFILE=${{ secrets.OCI_CONFIG_PROFILE }}
          OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
          OCI_HOST=${{ secrets.OCI_HOST }}
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_TENANCY=${{ secrets.OCI_TENANCY }}
          OCI_USER=${{ secrets.OCI_USER }}
          OCI_CONFIG_FILE=${{ secrets.OCI_CONFIG_FILE }}
          OCI_KEY_FILE=${{ secrets.OCI_KEY_FILE }}
          EOF
            echo "✅ .env file created with necessary environment variables"

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_VM_KEY }}" > ~/.ssh/oci_vm_key
          chmod 600 ~/.ssh/oci_vm_key
          ssh-keygen -l -f ~/.ssh/oci_vm_key && echo "✅ Key fingerprint OK" || (echo "❌ Key is malformed" && exit 1)

      - name: Add VM to known hosts
        run: |
          ssh-keyscan -p "${{ secrets.OCI_PORT }}" "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts
          echo "✅ Host added to known_hosts"

      - name: Test SSH connection
        run: |
          ssh \
            -i ~/.ssh/oci_vm_key \
            -p "${{ secrets.OCI_PORT }}" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "echo '✅ SSH connection successful'"

      - name: Ensure app directory exists on VM
        run: |
          ssh \
            -i ~/.ssh/oci_vm_key \
            -p "${{ secrets.OCI_PORT }}" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "mkdir -p ${{ secrets.OCI_APP_PATH }}"

      - name: Sync repository to Oracle VM
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/oci_vm_key -p ${{ secrets.OCI_PORT }}" \
            --exclude ".git" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "*.pyc" \
            ./ "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:${{ secrets.OCI_APP_PATH }}/"

      - name: Install Docker if not present
        run: |
          ssh \
            -i ~/.ssh/oci_vm_key \
            -p "${{ secrets.OCI_PORT }}" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "if ! command -v docker &> /dev/null; then
              echo 'Installing Docker...'
              sudo dnf install -y oracle-epel-release-el9
              sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker \$USER
              echo '✅ Docker installed'
            else
              echo '✅ Docker already installed, skipping'
            fi"

      - name: Deploy with Docker Compose
        run: |
          ssh \
            -i ~/.ssh/oci_vm_key \
            -p "${{ secrets.OCI_PORT }}" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "cd ${{ secrets.OCI_APP_PATH }} && docker compose down && docker compose up -d --build"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/oci_vm_key